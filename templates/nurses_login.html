<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nurses Login / Track</title>
  <link rel="stylesheet" href="/static/css/cwa-ui.css">
  <style>
    .nurse-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 16px}
    .nurse-tabs .tab.is-active{background:var(--cwa-navy);border-color:var(--cwa-navy);color:#fff}
    .nurse-tab-panel{display:none}
    .nurse-tab-panel.is-active{display:block}
    .nurse-info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px;margin:12px 0}
    .nurse-info-grid div{border:1px solid #d8e3ea;border-radius:8px;background:#f8fbfd;padding:10px}
    .nurse-info-grid strong{display:block;color:var(--cwa-navy);margin-bottom:4px}
    .nurse-alert{padding:12px;border-radius:8px;margin-bottom:12px;border:1px solid #d8e3ea;background:#f8fbfd}
    .nurse-alert.success{background:#f0fff4;border-color:#b7e4c7}
    .nurse-alert.warn{background:#fff7ed;border-color:#fed7aa}
    .nurse-alert.error{background:#fee2e2;border-color:#fecaca;color:#991b1b}
    .portal-table-wrap{overflow:auto}
    .portal-table-wrap table{width:100%;border-collapse:collapse}
    .portal-table-wrap th,.portal-table-wrap td{border-bottom:1px solid #e2e8f0;padding:8px;text-align:left;font-size:13px}
    .nurse-status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid #d8e3ea;background:#f8fbfd;font-size:12px;font-weight:700}
    .nurse-status-badge.pending{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
    .nurse-status-badge.approved{background:#f0fff4;border-color:#b7e4c7;color:#166534}
    .nurse-status-badge.rejected{background:#fee2e2;border-color:#fecaca;color:#991b1b}
    .nurse-status-badge.cancelled{background:#f1f5f9;border-color:#cbd5e1;color:#475569}
    .correction-card{border:1px solid #d8e3ea;border-radius:10px;background:#fff;padding:14px;display:grid;gap:10px}
    .correction-card__top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .correction-card__value{font-size:15px;color:var(--cwa-navy);font-weight:700}
    .correction-card__help{font-size:12px;color:var(--cwa-muted)}
    .correction-form{display:none;gap:10px}
    .correction-form.is-open{display:grid}
    .correction-history{margin-top:14px}
    @media(max-width:640px){.nurse-tabs .tab{flex:1 1 100%;text-align:center}.nurse-info-grid{grid-template-columns:1fr}}
  </style>
</head>
<body class="cwa-ui">
  <header class="cwa-topbar">
    <div class="cwa-shell">
      <div class="cwa-logo-strip">Embassy of Pakistan, Kuwait · Community Welfare Wing</div>
      <nav class="cwa-nav">
        <a href="/">Home</a>
        <a href="/nurses">Nurses Home</a>
        <a href="/nurses/register">Register</a>
      </nav>
      <a class="cwa-login" href="/login">Official Login</a>
    </div>
  </header>
  <section class="nurses-register-wrap">
    <div class="cwa-shell">
      <div class="panel">
        <h2 style="margin-top:0">Existing Nurse Login / Track Registration</h2>
        <form id="trackForm" class="nurses-grid">
          <div><label>Reference ID or Passport Number</label><input id="identity" required></div>
          <div><label>Mobile Number, Civil ID, or CNIC</label><input id="verifier" required></div>
          <div class="actions" style="grid-column:1/-1">
            <button type="submit">Open Nurse Dashboard</button>
            <a class="btn-outline" href="/nurses">Back</a>
            <a class="btn-outline" href="/">Home</a>
          </div>
        </form>
      </div>
      <div id="out" class="panel muted">Enter your details to view your nurse dashboard.</div>
    </div>
  </section>
  <script>
  let nurseProfile=null;
  let nurseVerifier='';
  let glFlash='';
  let glLoaded=false;
  let latestGlSummary=null;
  let latestCorrectionSummary=null;
  function esc(v){return String(v||'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));}
  function friendlyError(msg,fallback){
    const text=String(msg||'');
    if(!text || /failed to fetch|networkerror|load failed/i.test(text)){
      return fallback || 'Request could not be completed. Please check your connection and try again.';
    }
    return text;
  }
  async function postJson(url,payload,networkMessage){
    try{
      const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload||{})});
      let d={};
      try{d=await r.json();}catch(_e){d={success:false,error:'Server returned an invalid response.'};}
      if(!r.ok || d.success===false){throw new Error(d.error||'Request failed');}
      return d;
    }catch(e){
      return {success:false,error:friendlyError(e.message,networkMessage)};
    }
  }
  async function getJson(url,params,networkMessage){
    try{
      const q=new URLSearchParams(params||{}).toString();
      const r=await fetch(url+(q?'?'+q:''));
      let d={};
      try{d=await r.json();}catch(_e){d={success:false,error:'Server returned an invalid response.'};}
      if(!r.ok || d.success===false){throw new Error(d.error||'Request failed');}
      return d;
    }catch(e){
      return {success:false,error:friendlyError(e.message,networkMessage)};
    }
  }
  function glBase(){
    return {
      nurse_reference_id:(nurseProfile&&nurseProfile.reference_id)||identity.value,
      passport_number:(nurseProfile&&nurseProfile.passport_number)||'',
      verifier:nurseVerifier||verifier.value,
      session_marker:(nurseProfile&&nurseProfile.session_marker)||''
    };
  }
  function identityGrid(p){
    p=p||{};
    const labels={full_name:'Name',father_name:'Father Name',passport_number:'Passport No.',cnic:'CNIC',civil_id:'Civil ID',mobile:'Mobile',email:'Email'};
    return '<div class="nurse-info-grid">'+Object.keys(labels).map(k=>'<div><strong>'+labels[k]+'</strong>'+esc(p[k]||'—')+'</div>').join('')+'</div>';
  }
  function glGrade(pct){
    const p=Number(pct);
    if(!isFinite(p)) return '';
    if(p>=80) return 'Excellent';
    if(p>=70) return 'Very Good';
    if(p>=60) return 'Good';
    if(p>=50) return 'Pass';
    return 'Fail';
  }
  function canonicalQualificationCode(value){
    const code=String(value||'').trim().toUpperCase();
    if(code==='MIDWIFERY_ADDITIONAL') return 'SPECIALIZATION_MIDWIFERY';
    if(code==='MASTERS_IN_NURSING_MSN') return 'MASTERS_NURSING_MSN';
    return code;
  }
  function qualificationLabel(code, other){
    const normalized=canonicalQualificationCode(code);
    const labels={
      BSN_4Y:'BSN Nursing 4 Years',
      POST_RN_BSN:'Post RN BSN',
      GENERAL_NURSING_DIPLOMA:'General Nursing Diploma',
      SPECIALIZATION_MIDWIFERY:'Specialization / Midwifery',
      MASTERS_NURSING_MSN:'Masters in Nursing (MSN)',
      NURSING_DIPLOMA:'Nursing Diploma (Legacy)',
      OTHER:other||'Other (Legacy)'
    };
    return labels[normalized]||normalized||'—';
  }
  function qualificationOptions(selected, other){
    const normalized=canonicalQualificationCode(selected);
    const opts=[
      ['BSN_4Y','BSN Nursing 4 Years'],
      ['POST_RN_BSN','Post RN BSN'],
      ['GENERAL_NURSING_DIPLOMA','General Nursing Diploma'],
      ['SPECIALIZATION_MIDWIFERY','Specialization / Midwifery'],
      ['MASTERS_NURSING_MSN','Masters in Nursing (MSN)'],
      ['NURSING_DIPLOMA','Nursing Diploma (Legacy)'],
      ['OTHER','Other (Legacy)']
    ];
    if(normalized && !opts.some(o=>o[0]===normalized)){
      opts.push([normalized,qualificationLabel(normalized,other)]);
    }
    return opts.map(o=>'<option value="'+o[0]+'" '+(normalized===o[0]?'selected':'')+'>'+esc(o[1])+'</option>').join('');
  }
  function identifierType(value){
    const opts=['Student Number','Seat Number','Registration Number','Enrollment Number','Roll Number','Serial Number'];
    const current=String(value||'').trim().toLowerCase().replace(/[_-]+/g,' ');
    return opts.find(o=>o.toLowerCase()===current)||'Student Number';
  }
  function identifierOptions(selected){
    return ['Student Number','Seat Number','Registration Number','Enrollment Number','Roll Number','Serial Number']
      .map(label=>'<option value="'+esc(label)+'" '+(identifierType(selected)===label?'selected':'')+'>'+esc(label)+'</option>')
      .join('');
  }
  function appRows(apps){
    if(!apps||!apps.length) return '<p class="muted">No previous grading letter requests found.</p>';
    return '<h4>Previous Grading Letter Requests</h4><div class="portal-table-wrap"><table><thead><tr><th>Reference</th><th>Qualification</th><th>Final %</th><th>Grade</th><th>Status</th></tr></thead><tbody>'
      +apps.map(a=>{
        const quals=appQualifications(a);
        const labels=quals.map(q=>qualificationLabel(q.qualification_code,q.qualification_other)).join(', ');
        return '<tr><td>'+esc(a.ref_no)+'</td><td>'+esc(labels||a.qualification_label||'—')+'</td><td>'+esc(a.final_percentage==null?'':Number(a.final_percentage).toFixed(2))+'</td><td>'+esc(a.final_grade_label)+'</td><td>'+esc(a.status)+'</td></tr>';
      }).join('')
      +'</tbody></table></div>';
  }
  function normalizeGlMode(value){
    return value==='PERCENT'||value==='GPA'?value:'MARKS';
  }
  function blankQualification(){
    return {
      qualification_code:'',
      qualification_other:'',
      degree_title:'',
      student_identifier_type:'Student Number',
      student_no:'',
      institute:'',
      university:'',
      year_of_passing:'',
      mode:'MARKS',
      total_marks:'',
      obtained_marks:'',
      entered_percentage:'',
      entered_gpa:'',
      remarks:''
    };
  }
  function normalizeQualificationRecord(raw){
    raw=raw||{};
    return {
      qualification_code:canonicalQualificationCode(raw.qualification_code||''),
      qualification_other:raw.qualification_other||'',
      degree_title:raw.degree_title||'',
      student_identifier_type:identifierType(raw.student_identifier_type||raw.identifier_type||raw.student_no_label||''),
      student_no:raw.student_no||raw.identifier_value||'',
      institute:raw.institute||'',
      university:raw.university||'',
      year_of_passing:raw.year_of_passing==null?'':String(raw.year_of_passing),
      mode:normalizeGlMode(raw.mode),
      total_marks:raw.total_marks==null?'':String(raw.total_marks),
      obtained_marks:raw.obtained_marks==null?'':String(raw.obtained_marks),
      entered_percentage:raw.entered_percentage==null?'':String(raw.entered_percentage),
      entered_gpa:raw.entered_gpa==null?'':String(raw.entered_gpa),
      remarks:raw.remarks||'',
      final_percentage:raw.final_percentage,
      final_grade_label:raw.final_grade_label||''
    };
  }
  function appQualifications(app){
    if(app && Array.isArray(app.qualifications) && app.qualifications.length){
      return app.qualifications.map(normalizeQualificationRecord);
    }
    if(app){
      return [normalizeQualificationRecord(app)];
    }
    return [blankQualification()];
  }
  function glQualificationCardHtml(q,index,total){
    q=normalizeQualificationRecord(q);
    const mode=q.mode||'MARKS';
    return '<div class="gl-qualification-card" data-index="'+index+'" style="border:1px solid #d8e3ea;border-radius:10px;background:#fff;padding:14px;display:grid;gap:10px">'
      +'<div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center">'
      +'<div><strong style="color:var(--cwa-navy);font-size:16px">Qualification '+(index+1)+'</strong><p class="muted" style="margin:4px 0 0">Enter the qualification exactly as it should appear on the grading letter.</p></div>'
      +(index>0?'<button type="button" class="btn-outline gl-remove-qualification" data-remove-index="'+index+'">Remove</button>':'')
      +'</div>'
      +'<div><label>Qualification Type</label><select data-field="qualification_code">'+qualificationOptions(q.qualification_code,q.qualification_other)+'</select></div>'
      +'<div data-role="other-wrap" style="display:'+(q.qualification_code==='OTHER'?'block':'none')+'"><label>Other qualification text</label><input data-field="qualification_other" value="'+esc(q.qualification_other)+'"></div>'
      +'<div><label>Degree Title as printed on certificate</label><input data-field="degree_title" value="'+esc(q.degree_title)+'"></div>'
      +'<div class="nurses-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px">'
      +'<div><label>Identifier Type</label><select data-field="student_identifier_type">'+identifierOptions(q.student_identifier_type)+'</select></div>'
      +'<div><label>Identifier Value</label><input data-field="student_no" placeholder="Enter the number exactly as printed on your certificate/transcript." value="'+esc(q.student_no)+'"></div>'
      +'</div>'
      +'<div class="nurses-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px">'
      +'<div><label>College / Institute</label><input data-field="institute" value="'+esc(q.institute)+'"></div>'
      +'<div><label>University / Affiliating Body</label><input data-field="university" value="'+esc(q.university)+'"></div>'
      +'</div>'
      +'<div class="nurses-grid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px">'
      +'<div><label>Year of Passing</label><input data-field="year_of_passing" type="number" min="1950" max="2035" value="'+esc(q.year_of_passing)+'"></div>'
      +'<div><label>Grading Mode</label><select data-field="mode"><option value="MARKS" '+(mode==='MARKS'?'selected':'')+'>Marks</option><option value="PERCENT" '+(mode==='PERCENT'?'selected':'')+'>Percentage</option><option value="GPA" '+(mode==='GPA'?'selected':'')+'>GPA out of 4.00</option></select></div>'
      +'</div>'
      +'<div class="nurses-grid" data-mode-wrap="MARKS" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;display:'+(mode==='MARKS'?'grid':'none')+'">'
      +'<div><label>Total Marks / CGPA Scale</label><input data-field="total_marks" type="number" step="0.01" min="0" value="'+esc(q.total_marks)+'"></div>'
      +'<div><label>Obtained Marks / CGPA</label><input data-field="obtained_marks" type="number" step="0.01" min="0" value="'+esc(q.obtained_marks)+'"></div>'
      +'</div>'
      +'<div data-mode-wrap="PERCENT" style="display:'+(mode==='PERCENT'?'block':'none')+'"><label>Entered Percentage</label><input data-field="entered_percentage" type="number" step="0.01" min="0" max="100" value="'+esc(q.entered_percentage)+'"></div>'
      +'<div data-mode-wrap="GPA" style="display:'+(mode==='GPA'?'block':'none')+'"><label>GPA Obtained</label><input data-field="entered_gpa" type="number" step="0.01" min="0" max="4" value="'+esc(q.entered_gpa)+'"><p class="muted" style="margin:6px 0 0">Maximum GPA: 4.00</p></div>'
      +'<div style="padding:12px;border:1px solid #d8e3ea;border-radius:8px;background:#f8fbfd"><strong>Computed Percentage:</strong> <span data-role="preview-pct">—</span><br><strong>Provisional Grade Label:</strong> <span data-role="preview-grade">—</span><p class="muted" style="margin:8px 0 0">Final grade is verified by Embassy/Nurses Desk before letter is issued.</p><div data-role="validation-msg" class="muted" style="margin-top:8px;color:#991b1b"></div></div>'
      +'</div>';
  }
  function glFieldValue(card,field){
    const el=card.querySelector('[data-field="'+field+'"]');
    return el&&typeof el.value!=='undefined'?el.value:'';
  }
  function collectQualificationFromCard(card){
    return {
      qualification_code:canonicalQualificationCode(glFieldValue(card,'qualification_code')),
      qualification_other:glFieldValue(card,'qualification_other'),
      degree_title:glFieldValue(card,'degree_title'),
      student_identifier_type:identifierType(glFieldValue(card,'student_identifier_type')),
      student_no:glFieldValue(card,'student_no'),
      institute:glFieldValue(card,'institute'),
      university:glFieldValue(card,'university'),
      year_of_passing:glFieldValue(card,'year_of_passing'),
      mode:normalizeGlMode(glFieldValue(card,'mode')),
      total_marks:glFieldValue(card,'total_marks'),
      obtained_marks:glFieldValue(card,'obtained_marks'),
      entered_percentage:glFieldValue(card,'entered_percentage'),
      entered_gpa:glFieldValue(card,'entered_gpa'),
      remarks:''
    };
  }
  function collectGlQualifications(){
    return Array.from(document.querySelectorAll('.gl-qualification-card')).map(collectQualificationFromCard);
  }
  function computeQualificationPreview(q){
    q=normalizeQualificationRecord(q);
    let validation='';
    let pct=NaN;
    if(!q.qualification_code) validation='Qualification type is required.';
    else if(!q.degree_title.trim()) validation='Degree title is required.';
    else if(!q.student_identifier_type.trim()) validation='Identifier type is required.';
    else if(!q.student_no.trim()) validation='Identifier value is required.';
    else if(!q.institute.trim()) validation='College / institute is required.';
    else if(!q.university.trim()) validation='University / affiliating body is required.';
    else if(!q.year_of_passing.trim()) validation='Year of passing is required.';
    if(!validation && q.mode==='MARKS'){
      if(!String(q.total_marks||'').trim()) validation='Total marks / CGPA scale is required.';
      else if(!String(q.obtained_marks||'').trim()) validation='Obtained marks / CGPA is required.';
      else{
        const total=parseFloat(q.total_marks), got=parseFloat(q.obtained_marks);
        if(!(total>0)) validation='Total marks must be greater than zero.';
        else if(!(got>=0&&got<=total)) validation='Obtained marks cannot exceed total marks.';
        else pct=got/total*100;
      }
    }else if(!validation && q.mode==='PERCENT'){
      if(!String(q.entered_percentage||'').trim()) validation='Percentage is required.';
      else{
        const p=parseFloat(q.entered_percentage);
        if(!(p>=0&&p<=100)) validation='Percentage must be between 0 and 100.';
        else pct=p;
      }
    }else if(!validation){
      if(!String(q.entered_gpa||'').trim()) validation='GPA obtained is required.';
      else{
        const g=parseFloat(q.entered_gpa);
        if(!(g>=0&&g<=4)) validation='GPA cannot exceed 4.00.';
        else pct=g/4*100;
      }
    }
    return {
      percentage:isFinite(pct)?Number(pct.toFixed(2)):NaN,
      grade:isFinite(pct)?glGrade(pct):'—',
      validation:validation,
      canPreview:!validation && isFinite(pct)
    };
  }
  function glFormHtml(app){
    app=app||{};
    const quals=appQualifications(app);
    const submitLabel=(app.status==='CORRECTION_REQUIRED'?'Resubmit Corrected Request':app.can_nurse_edit?'Update Submitted Request':'Submit Grading Letter Request');
    return '<form id="glForm" class="nurses-grid" data-app-id="'+esc(app.id||'')+'" data-status="'+esc(app.status||'')+'" data-can-edit="'+(app.can_nurse_edit?'1':'0')+'">'
      +'<div style="grid-column:1/-1" class="nurse-alert">Add all nursing qualifications that should appear on your Embassy grading letter. They will be printed together on one official letter.</div>'
      +'<div id="glQualificationsWrap" style="grid-column:1/-1;display:grid;gap:12px">'+quals.map((q,index)=>glQualificationCardHtml(q,index,quals.length)).join('')+'</div>'
      +'<div style="grid-column:1/-1"><button id="glAddQualificationBtn" type="button" class="btn-outline">+ Add Additional Qualification</button></div>'
      +'<div id="glValidationMsg" style="grid-column:1/-1;color:#991b1b;font-size:13px"></div>'
      +'<div style="grid-column:1/-1" class="nurse-alert">Please bring original degree/transcript/marksheet for verification when requested by Embassy.</div>'
      +'<label style="grid-column:1/-1"><input id="gl_preview_confirmed" type="checkbox"> I have reviewed the preview details and confirm the information is correct to the best of my knowledge.</label>'
      +'<label style="grid-column:1/-1"><input id="gl_declaration" type="checkbox"> I confirm the information is true and based on my documents. I understand the Embassy issues this letter on request without liability.</label>'
      +'<div class="actions" style="grid-column:1/-1"><button id="glSubmitBtn" type="submit" disabled>'+esc(submitLabel)+'</button><span id="glMsg" class="muted"></span></div>'
      +'</form>';
  }
  function collectGlPayload(){
    const form=document.getElementById('glForm');
    const qualifications=collectGlQualifications();
    const first=qualifications[0]||blankQualification();
    return Object.assign(glBase(),{
      id:form.dataset.appId||'',
      qualification_code:first.qualification_code,
      qualification_other:first.qualification_other,
      degree_title:first.degree_title,
      student_identifier_type:first.student_identifier_type,
      student_no:first.student_no,
      institute:first.institute,
      university:first.university,
      year_of_passing:first.year_of_passing,
      mode:first.mode,
      total_marks:first.mode==='MARKS'?first.total_marks:'',
      obtained_marks:first.mode==='MARKS'?first.obtained_marks:'',
      entered_percentage:first.mode==='PERCENT'?first.entered_percentage:'',
      entered_gpa:first.mode==='GPA'?first.entered_gpa:'',
      qualifications:qualifications.map(q=>({
        qualification_code:q.qualification_code,
        qualification_other:q.qualification_other,
        degree_title:q.degree_title,
        student_identifier_type:q.student_identifier_type,
        student_no:q.student_no,
        institute:q.institute,
        university:q.university,
        year_of_passing:q.year_of_passing,
        mode:q.mode,
        total_marks:q.mode==='MARKS'?q.total_marks:'',
        obtained_marks:q.mode==='MARKS'?q.obtained_marks:'',
        entered_percentage:q.mode==='PERCENT'?q.entered_percentage:'',
        entered_gpa:q.mode==='GPA'?q.entered_gpa:'',
        remarks:''
      })),
      declaration_accepted:!!(document.getElementById('gl_declaration')||{}).checked,
      preview_confirmed:!!(document.getElementById('gl_preview_confirmed')||{}).checked
    });
  }
  function renderGlQualificationCards(quals){
    const wrap=document.getElementById('glQualificationsWrap');
    if(!wrap) return;
    wrap.innerHTML=quals.map((q,index)=>glQualificationCardHtml(q,index,quals.length)).join('');
    updateGlForm();
  }
  function glAddQualification(){
    const quals=collectGlQualifications();
    quals.push(blankQualification());
    renderGlQualificationCards(quals);
    setTimeout(function(){
      const card=document.querySelector('.gl-qualification-card[data-index="'+(quals.length-1)+'"]');
      if(card && card.scrollIntoView) card.scrollIntoView({behavior:'smooth',block:'start'});
      const input=card&&card.querySelector('select,input,textarea');
      if(input&&input.focus) input.focus();
    },0);
  }
  function glRemoveQualification(index){
    const quals=collectGlQualifications();
    if(quals.length<=1) return;
    quals.splice(index,1);
    renderGlQualificationCards(quals);
  }
  function updateGlForm(){
    const form=document.getElementById('glForm');
    if(!form) return;
    const previewConfirmed=document.getElementById('gl_preview_confirmed');
    const declaration=document.getElementById('gl_declaration');
    const validationEl=document.getElementById('glValidationMsg');
    const submitBtn=document.getElementById('glSubmitBtn');
    const cards=Array.from(form.querySelectorAll('.gl-qualification-card'));
    const previews=cards.map(function(card,index){
      const q=collectQualificationFromCard(card);
      const mode=q.mode;
      card.querySelectorAll('[data-mode-wrap]').forEach(function(el){
        el.style.display=el.getAttribute('data-mode-wrap')===mode?(el.getAttribute('data-mode-wrap')==='MARKS'?'grid':'block'):'none';
      });
      const otherWrap=card.querySelector('[data-role="other-wrap"]');
      if(otherWrap) otherWrap.style.display=q.qualification_code==='OTHER'?'block':'none';
      const preview=computeQualificationPreview(q);
      const pctEl=card.querySelector('[data-role="preview-pct"]');
      const gradeEl=card.querySelector('[data-role="preview-grade"]');
      const msgEl=card.querySelector('[data-role="validation-msg"]');
      if(pctEl) pctEl.textContent=isFinite(preview.percentage)?preview.percentage.toFixed(2)+'%':'—';
      if(gradeEl) gradeEl.textContent=preview.grade||'—';
      if(msgEl) msgEl.textContent=preview.validation?'Qualification '+(index+1)+': '+preview.validation:'';
      return preview;
    });
    let validation='';
    const firstBadIndex=previews.findIndex(function(p){return !!p.validation;});
    if(firstBadIndex>=0) validation='Qualification '+(firstBadIndex+1)+': '+previews[firstBadIndex].validation;
    else if(!(previewConfirmed&&previewConfirmed.checked)) validation='Please review the preview details and confirm the information before submission.';
    else if(!(declaration&&declaration.checked)) validation='Please accept the declaration before submission.';
    if(validationEl) validationEl.textContent=validation;
    if(submitBtn) submitBtn.disabled=!(cards.length && previews.every(function(p){return p.canPreview;}) && previewConfirmed&&previewConfirmed.checked && declaration&&declaration.checked && !validation);
  }
  function wireGlForm(){
    const form=document.getElementById('glForm');
    if(!form) return;
    const addBtn=document.getElementById('glAddQualificationBtn');
    if(addBtn) addBtn.addEventListener('click',glAddQualification);
    form.addEventListener('click',function(e){
      const btn=e.target&&e.target.closest?e.target.closest('.gl-remove-qualification'):null;
      if(!btn) return;
      e.preventDefault();
      glRemoveQualification(Number(btn.getAttribute('data-remove-index')||0));
    });
    form.addEventListener('input',updateGlForm);
    form.addEventListener('change',updateGlForm);
    form.addEventListener('submit',async function(e){
      e.preventDefault();
      updateGlForm();
      const submitBtn=document.getElementById('glSubmitBtn');
      const msgEl=document.getElementById('glMsg');
      if(submitBtn&&submitBtn.disabled) return false;
      if(msgEl) msgEl.textContent='Submitting...';
      const endpoint=form.dataset.canEdit==='1'?'/api/nurses/grading-letter/resubmit':'/api/nurses/grading-letter/submit';
      const d=await postJson(endpoint,collectGlPayload(),'Request could not be submitted. Please check your connection and try again. If the problem continues, contact the Embassy.');
      if(!d.success){if(msgEl) msgEl.textContent=friendlyError(d.error);return false;}
      const msg=d.message || (form.dataset.canEdit==='1'?'Grading letter request resubmitted successfully.':'Grading letter request submitted successfully.');
      glFlash=msg+' Reference: '+(d.reference||'');
      if(msgEl) msgEl.textContent=glFlash;
      await loadGradingLetter(true);
      return false;
    });
    updateGlForm();
  }
  async function glCancel(id){
    if(!confirm('Cancel this grading letter request?')) return;
    const d=await postJson('/api/nurses/grading-letter/cancel',Object.assign(glBase(),{id:id}));
    alert(d.success?'Request cancelled.':friendlyError(d.error));
    await loadGradingLetter(true);
  }
  function renderGradingLetter(d){
    latestGlSummary=d||{};
    const p=d.profile||nurseProfile||{};
    const a=d.active_application||d.active_request||d.activeRequest||null;
    const history=d.applications||d.history||[];
    let html='<h3>Grading Letter Request</h3>'
      +'<div class="nurse-alert">Add all nursing qualifications that should appear on your Embassy grading letter. They will be printed together on one official letter.</div>'
      +'<div class="nurse-alert warn">Submitting this form does not generate the official letter automatically. Embassy/Nurses Desk will verify the details before issuing the final letter.</div>'
      +(glFlash?'<div class="nurse-alert success">'+esc(glFlash)+'</div>':'')
      +identityGrid(p);
    if(a){
      const quals=appQualifications(a);
      html+='<div class="nurse-alert"><strong>Reference No.:</strong> '+esc(a.ref_no||a.reference||'')+'<br><strong>Status:</strong> '+esc(a.status||'')+'<br><strong>Submitted date:</strong> '+esc(a.submitted_at||a.created_at||'')+(a.correction_notes?'<br><strong>Admin correction notes:</strong> '+esc(a.correction_notes):'')+'</div>';
      html+='<div style="display:grid;gap:8px;margin-bottom:12px">'+quals.map(function(q,index){
        const pct=q.final_percentage==null&&q.computed_percentage==null?'—':Number(q.final_percentage==null?q.computed_percentage:q.final_percentage).toFixed(2)+'%';
        return '<div style="border:1px solid #d8e3ea;border-radius:8px;background:#f8fbfd;padding:10px"><strong style="color:var(--cwa-navy)">Qualification '+(index+1)+'</strong><div style="margin-top:4px">'+esc(qualificationLabel(q.qualification_code,q.qualification_other))+'</div><div class="muted">'+esc(identifierType(q.student_identifier_type||q.identifier_type||q.student_no_label||''))+': '+esc(q.student_no||q.identifier_value||'—')+'</div><div class="muted">Final %: '+esc(pct)+' | Grade: '+esc(q.final_grade_label||'—')+'</div></div>';
      }).join('')+'</div>';
      if(a.letter_download_url){html+='<p><a class="btn-outline" href="'+esc(a.letter_download_url)+'">Download Letter</a></p>';}
      if(a.can_nurse_edit){html+=glFormHtml(a);}
      if(a.can_nurse_cancel){html+='<p><button class="btn-outline" type="button" onclick="glCancel('+Number(a.id)+')">Cancel Request</button></p>';}
      if(!a.can_nurse_edit){html+='<p class="muted">You already have an active grading letter request. You can submit a new request after the current one is issued, rejected, or cancelled.</p>';}
    }else{
      html+=glFormHtml(null);
    }
    html+=appRows(history);
    glPanel.innerHTML=html;
    wireGlForm();
    renderMyRequests();
  }
  async function loadGradingLetter(force){
    if(!nurseProfile) return;
    if(glLoaded && !force) return;
    glPanel.textContent='Loading grading letter details...';
    const d=await getJson('/api/nurses/grading-letter/summary',glBase());
    if(!d.success){glPanel.innerHTML='<div class="nurse-alert error">'+esc(friendlyError(d.error))+'</div>';return;}
    glLoaded=true;
    renderGradingLetter(d);
  }
  function renderOverview(x){
    const corrections=x.correction_requests||[];
    const pendingCorrections=corrections.filter(r=>String(r.status||'').toUpperCase()==='PENDING');
    const steps=(x.steps||[]).map(s=>'<tr><td>'+esc(s.label)+'</td><td>'+esc(s.status)+'</td></tr>').join('');
    return '<h3>Nurse Profile</h3>'+identityGrid(x)
      +'<div class="nurse-info-grid"><div><strong>Batch / Flight No.</strong>'+esc(x.batch_number||'—')+'</div><div><strong>Date of Arrival</strong>'+esc(x.arrival_date||'—')+'</div><div><strong>Employer / Hospital</strong>'+esc(x.hospital_workplace||x.hospital||'—')+'</div><div><strong>Visa Number</strong>'+esc(x.visa_number||'—')+'</div></div>'
      +(pendingCorrections.length?'<div class="nurse-alert warn"><strong>'+esc(String(pendingCorrections.length))+' correction request(s) are pending Embassy review.</strong><div style="margin-top:6px">Use the Corrections tab to track or submit updates for locked identity fields.</div></div>':'')
      +'<h3>Progress</h3><p><strong>'+esc(x.steps_completed)+' / '+esc(x.steps_total)+'</strong> completed ('+esc(x.progress_percent)+'%)</p>'
      +'<div class="portal-table-wrap"><table><thead><tr><th>Step</th><th>Status</th></tr></thead><tbody>'+steps+'</tbody></table></div>';
  }
  function renderStay(x){
    const f=x.facility_record||{};
    return '<h3>Stay Arrangement</h3><div class="nurse-info-grid">'
      +'<div><strong>Current Stay Arrangement</strong>'+esc(f.current_arrangement||x.current_arrangement||'—')+'</div>'
      +'<div><strong>Facility</strong>'+esc(f.facility_name||x.facility_name||'—')+'</div>'
      +'<div><strong>Area</strong>'+esc(f.facility_area||x.facility_area||'—')+'</div>'
      +'<div><strong>Status</strong>'+esc(f.current_status||'—')+'</div></div>'
      +'<p><a class="btn-outline" href="/nurses/accommodation">Submit Accommodation Request</a></p>';
  }
  function renderComplaintTab(){
    return '<h3>Complaint</h3><form id="portalComplaintForm" class="nurses-grid">'
      +'<div><label>Category</label><select id="pc_category"><option>Accommodation</option><option>Maintenance</option><option>Hospital / Workplace Concern</option><option>Welfare Assistance</option><option>Grading Letter / OEC Issue</option><option selected>General Request</option><option>Other</option></select></div>'
      +'<div><label>Priority</label><select id="pc_priority"><option>Normal</option><option>Important</option><option>Urgent</option></select></div>'
      +'<div><label>Preferred Contact</label><select id="pc_contact"><option>WhatsApp</option><option>Phone</option><option>Email</option></select></div>'
      +'<div><label>Subject</label><input id="pc_subject"></div>'
      +'<div style="grid-column:1/-1"><label>Description</label><textarea id="pc_description" rows="4"></textarea></div>'
      +'<label style="grid-column:1/-1"><input id="pc_consent" type="checkbox"> I confirm this information is correct and may be reviewed by Embassy staff.</label>'
      +'<div class="actions" style="grid-column:1/-1"><button type="submit">Submit Complaint / Request</button><span id="pc_msg" class="muted"></span></div></form>';
  }
  function wireComplaintTab(){
    const form=document.getElementById('portalComplaintForm');
    if(!form) return;
    form.addEventListener('submit',async e=>{
      e.preventDefault();
      pc_msg.textContent='Submitting...';
      const d=await postJson('/api/nurses/complaint',Object.assign(glBase(),{complaint_category:pc_category.value,category:pc_category.value,priority:pc_priority.value,preferred_contact_method:pc_contact.value,subject:pc_subject.value,description:pc_description.value,consent:pc_consent.checked}));
      pc_msg.textContent=d.success?'Complaint submitted. Reference: '+(d.complaint_id||''):friendlyError(d.error);
    });
  }
  function renderLeavingTab(){
    const f=(nurseProfile&&nurseProfile.facility_record)||{};
    return '<h3>Leaving Notice</h3><form id="portalLeaveForm" class="nurses-grid">'
      +'<div><label>Current Facility</label><input id="pl_facility" value="'+esc(f.facility_name||'')+'"></div>'
      +'<div><label>Intended Leaving Date</label><input id="pl_date" type="date"></div>'
      +'<div><label>Reason Category</label><select id="pl_category"><option>Private Self Arranged</option><option>MOH Arranged</option><option>Shifted to Alternative Facility</option><option>Leaving Kuwait</option><option>Other</option></select></div>'
      +'<div><label>New Stay Arrangement</label><input id="pl_new_stay"></div>'
      +'<div><label>New Area</label><input id="pl_new_area"></div>'
      +'<div><label>Embassy Assistance Required</label><select id="pl_assistance"><option>No</option><option>Yes</option></select></div>'
      +'<div style="grid-column:1/-1"><label>Reason / Remarks</label><textarea id="pl_reason" rows="4"></textarea></div>'
      +'<div class="actions" style="grid-column:1/-1"><button type="submit">Submit Leaving Notice</button><span id="pl_msg" class="muted"></span></div></form>';
  }
  function wireLeavingTab(){
    const form=document.getElementById('portalLeaveForm');
    if(!form) return;
    form.addEventListener('submit',async e=>{
      e.preventDefault();
      pl_msg.textContent='Submitting...';
      const d=await postJson('/api/nurses/leave-notice',Object.assign(glBase(),{current_facility:pl_facility.value,intended_leaving_date:pl_date.value,reason_category:pl_category.value,new_stay_arrangement:pl_new_stay.value,new_area:pl_new_area.value,assistance_required:pl_assistance.value,reason:pl_reason.value,remarks:pl_reason.value}));
      pl_msg.textContent=d.success?'Leaving notice submitted.':friendlyError(d.error);
    });
  }
  function renderMyRequests(){
    const target=document.getElementById('requestsPanel');
    if(!target || !nurseProfile) return;
    const complaints=nurseProfile.complaints||[];
    const corrections=nurseProfile.correction_requests||[];
    const complaintRows=complaints.length?'<h4>Complaints / Requests</h4><div class="portal-table-wrap"><table><thead><tr><th>Reference</th><th>Subject</th><th>Category</th><th>Status</th><th>Submitted</th></tr></thead><tbody>'+complaints.map(c=>'<tr><td>'+esc(c.complaint_id)+'</td><td>'+esc(c.subject)+'</td><td>'+esc(c.category)+'</td><td>'+esc(c.status)+'</td><td>'+esc(c.submitted_date)+'</td></tr>').join('')+'</tbody></table></div>':'<p class="muted">No complaint requests found.</p>';
    const correctionRows=corrections.length
      ?'<h4>Correction Requests</h4><div class="portal-table-wrap"><table><thead><tr><th>Field</th><th>Requested Value</th><th>Status</th><th>Submitted</th><th>Remarks</th></tr></thead><tbody>'
        +corrections.map(r=>'<tr><td>'+esc(r.field_label||r.field_name)+'</td><td>'+esc(r.requested_value||'—')+'</td><td>'+correctionStatusBadge(r.status)+'</td><td>'+esc(r.created_at||'—')+'</td><td>'+esc(r.review_remarks||'—')+'</td></tr>').join('')
        +'</tbody></table></div>'
      :'<p class="muted">No correction requests found.</p>';
    target.innerHTML='<h3>My Requests</h3>'+complaintRows+correctionRows+(latestGlSummary?appRows(latestGlSummary.applications||latestGlSummary.history||[]):'<p class="muted">Open the Grading Letter tab to load grading letter requests.</p>');
  }
  function correctionStatusClass(status){
    const s=String(status||'').toUpperCase();
    if(s==='APPROVED') return 'approved';
    if(s==='REJECTED') return 'rejected';
    if(s==='CANCELLED') return 'cancelled';
    return 'pending';
  }
  function correctionStatusBadge(status){
    const s=String(status||'PENDING').toUpperCase();
    return '<span class="nurse-status-badge '+correctionStatusClass(s)+'">'+esc(s.replace(/_/g,' '))+'</span>';
  }
  function renderCorrectionHistoryRows(rows){
    if(!rows || !rows.length){
      return '<p class="muted">No correction requests submitted yet.</p>';
    }
    return '<div class="portal-table-wrap"><table><thead><tr><th>Field</th><th>Old Value</th><th>Requested Value</th><th>Status</th><th>Submitted</th><th>Review Remarks</th></tr></thead><tbody>'
      +rows.map(r=>'<tr><td>'+esc(r.field_label||r.field_name)+'</td><td>'+esc(r.old_value||'—')+'</td><td>'+esc(r.requested_value||'—')+'</td><td>'+correctionStatusBadge(r.status)+'</td><td>'+esc(r.created_at||'—')+'</td><td>'+esc(r.review_remarks||'—')+'</td></tr>').join('')
      +'</tbody></table></div>';
  }
  function renderCorrectionTabData(summary){
    const target=document.getElementById('correctionPanel');
    if(!target || !nurseProfile) return;
    summary=summary||latestCorrectionSummary||{};
    const lockedFields=summary.locked_fields||nurseProfile.locked_correction_fields||[];
    const requests=summary.requests||nurseProfile.correction_requests||[];
    target.innerHTML='<h3>Applicant Detail Corrections</h3>'
      +'<div class="nurse-alert warn"><strong>These identity and arrival fields are locked after submission.</strong><div style="margin-top:6px">If any of them are incorrect, submit a correction request below. Embassy staff must approve the request before your profile is updated.</div></div>'
      +lockedFields.map(function(field){
        const pending=Number(field.pending_request_id||0)>0;
        const formId='corr-form-'+field.name;
        const valueId='corr-value-'+field.name;
        const reasonId='corr-reason-'+field.name;
        const msgId='corr-msg-'+field.name;
        return '<div class="correction-card">'
          +'<div class="correction-card__top"><div><div style="font-weight:700;color:var(--cwa-navy)">'+esc(field.label)+'</div><div class="correction-card__value">'+esc(field.current_value||'—')+'</div><div class="correction-card__help">'+esc(field.help||'')+'</div></div><div>'+(pending?correctionStatusBadge('PENDING'):'')+'</div></div>'
          +(pending?'<div class="nurse-alert warn" style="margin:0"><strong>A request for this field is already pending review.</strong><div style="margin-top:6px">Requested value: '+esc(field.pending_requested_value||'—')+'</div></div>':'')
          +'<div><button type="button" class="btn-outline" onclick="toggleCorrectionForm(\''+esc(field.name)+'\')" '+(pending?'disabled':'')+'>Request Correction</button></div>'
          +'<div id="'+formId+'" class="correction-form"><div><label>Corrected value</label><input id="'+valueId+'" value=""></div><div><label>Reason for correction</label><textarea id="'+reasonId+'" rows="3" placeholder="Explain briefly why this field should be corrected."></textarea></div><div class="actions"><button type="button" onclick="submitCorrectionRequest(\''+esc(field.name)+'\')">Submit Request</button><span id="'+msgId+'" class="muted"></span></div></div>'
          +'</div>';
      }).join('')
      +'<div class="correction-history"><h4>Correction Request History</h4>'+renderCorrectionHistoryRows(requests)+'</div>';
  }
  function toggleCorrectionForm(fieldName){
    const el=document.getElementById('corr-form-'+fieldName);
    if(!el) return;
    el.classList.toggle('is-open');
  }
  function applyCorrectionSummary(summary){
    latestCorrectionSummary=summary||{};
    if(!nurseProfile) return;
    nurseProfile.correction_requests=latestCorrectionSummary.requests||[];
    nurseProfile.locked_correction_fields=latestCorrectionSummary.locked_fields||[];
    const overview=document.getElementById('panel-overview');
    if(overview) overview.innerHTML=renderOverview(nurseProfile);
    renderCorrectionTabData(latestCorrectionSummary);
    renderMyRequests();
  }
  async function loadCorrections(force){
    if(!nurseProfile) return;
    if(latestCorrectionSummary && !force){
      renderCorrectionTabData(latestCorrectionSummary);
      return;
    }
    const target=document.getElementById('correctionPanel');
    if(target) target.innerHTML='<div class="muted">Loading correction workflow…</div>';
    const d=await postJson('/api/nurses/corrections/list',Object.assign(glBase(),{identity:identity.value,verifier:nurseVerifier||verifier.value}),'Correction history could not be loaded. Please try again.');
    if(!d.success){
      if(target) target.innerHTML='<div class="nurse-alert error">'+esc(friendlyError(d.error))+'</div>';
      return;
    }
    applyCorrectionSummary(d);
  }
  async function submitCorrectionRequest(fieldName){
    const msgEl=document.getElementById('corr-msg-'+fieldName);
    if(msgEl) msgEl.textContent='Submitting...';
    const d=await postJson('/api/nurses/corrections/submit',Object.assign(glBase(),{
      identity:identity.value,
      verifier:nurseVerifier||verifier.value,
      field_name:fieldName,
      requested_value:(document.getElementById('corr-value-'+fieldName)||{}).value||'',
      reason:(document.getElementById('corr-reason-'+fieldName)||{}).value||''
    }),'Correction request could not be submitted. Please try again.');
    if(!d.success){
      if(msgEl) msgEl.textContent=friendlyError(d.error);
      return;
    }
    if(msgEl) msgEl.textContent=d.message||'Correction request submitted.';
    await loadCorrections(true);
    switchNurseTab('corrections');
  }
  function renderPasswordTab(){
    return '<h3>Change password</h3><form id="portalPasswordForm" class="nurses-grid">'
      +'<div><label>Current Password</label><input id="pp_current" type="password"></div>'
      +'<div><label>New Password</label><input id="pp_new" type="password"></div>'
      +'<div><label>Confirm New Password</label><input id="pp_confirm" type="password"></div>'
      +'<div class="actions" style="grid-column:1/-1"><button type="submit">Change password</button><span id="pp_msg" class="muted"></span></div></form>';
  }
  function wirePasswordTab(){
    const form=document.getElementById('portalPasswordForm');
    if(!form) return;
    form.addEventListener('submit',async e=>{
      e.preventDefault();
      pp_msg.textContent='Updating...';
      const d=await postJson('/api/nurses/change-password',{nurse_reference_id:nurseProfile.reference_id,current_password:pp_current.value,new_password:pp_new.value,confirm_password:pp_confirm.value});
      pp_msg.textContent=d.success?(d.message||'Password updated.'):friendlyError(d.error);
    });
  }
  function switchNurseTab(tab){
    document.querySelectorAll('.nurse-tabs .tab').forEach(b=>b.classList.toggle('is-active',b.dataset.tab===tab));
    document.querySelectorAll('.nurse-tab-panel').forEach(p=>p.classList.toggle('is-active',p.id==='panel-'+tab));
    if(tab==='grading') loadGradingLetter(false);
    if(tab==='requests') renderMyRequests();
    if(tab==='corrections') loadCorrections(false);
  }
  function renderPortal(x){
    out.className='panel';
    out.innerHTML='<div><h3 style="margin-top:0">Nurse Dashboard</h3><p class="muted">Reference: '+esc(x.reference_id)+' | '+esc(x.full_name)+' | Passport: '+esc(x.passport_number)+'</p></div>'
      +'<div class="nurse-tabs">'
      +'<button type="button" class="tab is-active" data-tab="overview" onclick="switchNurseTab(\'overview\')">Overview</button>'
      +'<button type="button" class="tab" data-tab="corrections" onclick="switchNurseTab(\'corrections\')">Corrections</button>'
      +'<button type="button" class="tab" data-tab="stay" onclick="switchNurseTab(\'stay\')">Stay Arrangement</button>'
      +'<button type="button" class="tab" data-tab="complaint" onclick="switchNurseTab(\'complaint\')">Complaint</button>'
      +'<button type="button" class="tab" data-tab="grading" onclick="switchNurseTab(\'grading\')">Grading Letter</button>'
      +'<button type="button" class="tab" data-tab="leaving" onclick="switchNurseTab(\'leaving\')">Leaving Notice</button>'
      +'<button type="button" class="tab" data-tab="requests" onclick="switchNurseTab(\'requests\')">My Requests</button>'
      +'<button type="button" class="tab" data-tab="password" onclick="switchNurseTab(\'password\')">Change password</button>'
      +'</div>'
      +'<section id="panel-overview" class="nurse-tab-panel is-active">'+renderOverview(x)+'</section>'
      +'<section id="panel-corrections" class="nurse-tab-panel"><div id="correctionPanel">Open the Corrections tab to load correction requests.</div></section>'
      +'<section id="panel-stay" class="nurse-tab-panel">'+renderStay(x)+'</section>'
      +'<section id="panel-complaint" class="nurse-tab-panel">'+renderComplaintTab()+'</section>'
      +'<section id="panel-grading" class="nurse-tab-panel"><div id="glPanel">Select the Grading Letter tab to load details.</div></section>'
      +'<section id="panel-leaving" class="nurse-tab-panel">'+renderLeavingTab()+'</section>'
      +'<section id="panel-requests" class="nurse-tab-panel"><div id="requestsPanel"></div></section>'
      +'<section id="panel-password" class="nurse-tab-panel">'+renderPasswordTab()+'</section>';
    wireComplaintTab();
    wireLeavingTab();
    wirePasswordTab();
    applyCorrectionSummary({
      requests:x.correction_requests||[],
      locked_fields:x.locked_correction_fields||[]
    });
    renderMyRequests();
    if(location.hash==='#grading-letter' || location.pathname.indexOf('/nurses/grading-letter')===0) switchNurseTab('grading');
  }
  document.getElementById('trackForm').addEventListener('submit', async function(e){
    e.preventDefault();
    out.textContent='Opening dashboard...';
    const d=await postJson('/api/nurses/track',{identity:identity.value,verifier:verifier.value});
    if(!d.success){out.textContent='No matching registration found. Please check your details.';return false;}
    const x=d.data||{};
    nurseProfile=x;
    nurseVerifier=verifier.value;
    glLoaded=false;
    latestGlSummary=null;
    latestCorrectionSummary=null;
    renderPortal(x);
    return false;
  });
  </script>
</body>
</html>
